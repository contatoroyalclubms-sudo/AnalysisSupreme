# Prometheus configuration for CryptoBot Supremo Global
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'cryptobot-supremo'

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # CryptoBot API metrics
  - job_name: 'cryptobot-api'
    static_configs:
      - targets: ['analysissupreme:8000']
    metrics_path: '/metrics'
    scrape_interval: 5s
    scrape_timeout: 10s
    honor_labels: true

  # CryptoBot Dashboard metrics
  - job_name: 'cryptobot-dashboard'
    static_configs:
      - targets: ['analysissupreme:8050']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # PostgreSQL metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Storage configuration
storage:
  tsdb:
    retention.time: 30d
    retention.size: 10GB

name: cryptobot-supremo
region: nyc

services:
- name: api
  source_dir: /
  github:
    repo: contatoroyalclubms-sudo/AnalysisSupreme
    branch: main
    deploy_on_push: true
  dockerfile_path: Dockerfile.prod
  http_port: 8000
  instance_count: 1
  instance_size_slug: basic-xxs
  routes:
  - path: /
  envs:
  - key: ENVIRONMENT
    value: production
  - key: PYTHONPATH
    value: /app
  - key: DATABASE_URL
    value: ${db.DATABASE_URL}
  - key: REDIS_URL
    value: ${redis.REDIS_URL}
  - key: SECRET_KEY
    value: ${SECRET_KEY}
  - key: API_KEY_BINANCE
    value: ${API_KEY_BINANCE}
  - key: API_SECRET_BINANCE
    value: ${API_SECRET_BINANCE}
  health_check:
    http_path: /health

databases:
- name: db
  engine: PG
  version: "15"
  size: basic-xxs
  num_nodes: 1

- name: redis
  engine: REDIS
  version: "7"
  size: basic-xxs

static_sites:
- name: dashboard
  source_dir: /static
  routes:
  - path: /static
